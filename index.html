<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proscitos</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

.nav {
  display: flex;
  justify-content: space-between;
  padding: 16px 30px;
  background: #020617;
}

.logo {
  font-weight: bold;
  font-size: 20px;
}

.mode-btn {
  padding: 6px 14px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-left: 6px;
}

.active {
  background: #38bdf8;
  color: black;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 30px;
}

.card {
  background: #020617;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

h2 { margin-top: 0; }

.green { color: #22c55e; }
.red { color: #ef4444; }

/* SARAL MODE */
[data-mode="saral"] {
  background: #f7f8fa;
  color: black;
}

[data-mode="saral"] .card {
  background: white;
}

</style>
</head>

<body>

<div class="nav">
  <div class="logo">Proscitos</div>
  <div>
    <button id="mp" class="mode-btn active" onclick="setMode('pro')">Pro</button>
    <button id="ms" class="mode-btn" onclick="setMode('saral')">Saral</button>
  </div>
</div>

<div class="container">

<!-- PRO -->
<div id="pro-home">

  <div class="card">
    <h2>Portfolio Value</h2>
    <h1>₹8,247.50</h1>
    <p class="green">+₹647.50 (+8.5%)</p>
  </div>

  <div class="card">
    <h2>Holdings</h2>
    <p>MRF — ₹780 <span class="green">+5.2%</span></p>
    <p>Page Industries — ₹600 <span class="green">+6.5%</span></p>
    <p>Honeywell — ₹720 <span class="red">-1.9%</span></p>
  </div>

</div>

<!-- SARAL -->
<div id="saral-home" style="display:none;">

  <div class="card">
    <h2>Your Savings</h2>
    <h1>₹8,247</h1>
    <p class="green">You earned ₹647 🎉</p>
  </div>

  <div class="card">
    <h3>Simple Breakdown</h3>
    <p>Stocks: ₹7,288</p>
    <p>Spare Change: ₹312</p>
  </div>

</div>

</div>

<script>

function setMode(mode) {
  const pro = document.getElementById("pro-home");
  const saral = document.getElementById("saral-home");

  const mp = document.getElementById("mp");
  const ms = document.getElementById("ms");

  if (mode === "pro") {
    pro.style.display = "block";
    saral.style.display = "none";

    mp.classList.add("active");
    ms.classList.remove("active");

  } else {
    pro.style.display = "none";
    saral.style.display = "block";

    ms.classList.add("active");
    mp.classList.remove("active");
  }

  document.body.setAttribute("data-mode", mode);
}

window.onload = () => setMode("pro");

</script>

</body>
</html>
