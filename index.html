<!DOCTYPE html>
<html>
<body>

<h1>Test Mode Switch</h1>

<button onclick="setMode('pro')">Pro</button>
<button onclick="setMode('saral')">Saral</button>

<div id="pro-home">PRO VIEW</div>
<div id="saral-home" style="display:none;">SARAL VIEW</div>

<script>
function setMode(mode) {
  alert("Clicked: " + mode);

  let pro = document.getElementById("pro-home");
  let saral = document.getElementById("saral-home");

  if (mode === "pro") {
    pro.style.display = "block";
    saral.style.display = "none";
  } else {
    pro.style.display = "none";
    saral.style.display = "block";
  }
}
</script>

</body>
</html>
