<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proscitos</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #020617;
}

.logo {
  font-weight: bold;
  font-size: 18px;
}

/* buttons */
.mode-btn {
  padding: 6px 12px;
  margin-left: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.active {
  background: #38bdf8;
  color: black;
}

/* layout */
.page {
  padding: 40px;
}

.card {
  background: #020617;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

/* saral styling */
[data-mode="saral"] {
  background: #f7f8fa;
  color: black;
}

[data-mode="saral"] .card {
  background: white;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">Proscitos</div>
  <div>
    <button id="mp" class="mode-btn active" onclick="setMode('pro')">Pro</button>
    <button id="ms" class="mode-btn" onclick="setMode('saral')">Saral</button>
  </div>
</div>

<!-- MAIN PAGE -->
<div id="page-home" class="page">

  <!-- PRO VIEW -->
  <div id="pro-home">
    <div class="card">
      <h2>Pro Mode</h2>
      <p>Detailed analytics, charts, and advanced investing tools.</p>
    </div>

    <div class="card">
      <h3>Portfolio</h3>
      <p>₹8,247.50</p>
      <p style="color:lightgreen">+₹647.50 (8.5%)</p>
    </div>
  </div>

  <!-- SARAL VIEW -->
  <div id="saral-home" style="display:none;">
    <div class="card">
      <h2>Saral Mode</h2>
      <p>Simple investing, easy interface.</p>
    </div>

    <div class="card">
      <h3>Your Savings</h3>
      <p>₹8,247</p>
      <p style="color:green">You earned ₹647 🎉</p>
    </div>
  </div>

</div>

<script>

// mode switch (guaranteed working)
function setMode(mode) {
  const pro = document.getElementById("pro-home");
  const saral = document.getElementById("saral-home");

  const mp = document.getElementById("mp");
  const ms = document.getElementById("ms");

  // toggle views
  if (mode === "pro") {
    pro.style.display = "block";
    saral.style.display = "none";

    mp.classList.add("active");
    ms.classList.remove("active");

  } else {
    pro.style.display = "none";
    saral.style.display = "block";

    ms.classList.add("active");
    mp.classList.remove("active");
  }

  // theme switch
  document.body.setAttribute("data-mode", mode);
}

// default load
window.onload = function() {
  setMode("pro");
};

</script>

</body>
</html>
