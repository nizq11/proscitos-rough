<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proscitos</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #020617;
}

.logo { font-weight: bold; }

button {
  padding: 6px 12px;
  margin-left: 5px;
  cursor: pointer;
}

/* PAGES */
.page { display: none; padding: 40px; }
.page.active { display: block; }

/* MODES */
#saral-home { display: none; }

.card {
  background: #020617;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">Proscitos</div>
  <div>
    <button onclick="setMode('pro')" id="mp">Pro</button>
    <button onclick="setMode('saral')" id="ms">Saral</button>
  </div>
</div>

<!-- HOME -->
<div class="page active" id="page-home">

  <!-- PRO -->
  <div id="pro-home">
    <div class="card">
      <h2>Pro Mode</h2>
      <p>Detailed portfolio, analytics, charts.</p>
    </div>
  </div>

  <!-- SARAL -->
  <div id="saral-home">
    <div class="card">
      <h2>Saral Mode</h2>
      <p>Simple view, easy investing.</p>
    </div>
  </div>

</div>

<!-- DISCOVER -->
<div class="page" id="page-discover">
  <h2>Discover Page</h2>
</div>

<!-- ROBO -->
<div class="page" id="page-robo">
  <h2>Robo Page</h2>
</div>

<!-- SPARE -->
<div class="page" id="page-sparechange">
  <h2>Spare Change Page</h2>
</div>

<script>

// MODE SWITCH
function setMode(mode) {
  console.log("Switching to:", mode);

  const pro = document.getElementById("pro-home");
  const saral = document.getElementById("saral-home");

  if (mode === "pro") {
    pro.style.display = "block";
    saral.style.display = "none";
  } else {
    pro.style.display = "none";
    saral.style.display = "block";
  }

  document.getElementById("mp").style.background = mode === "pro" ? "#38bdf8" : "";
  document.getElementById("ms").style.background = mode === "saral" ? "#38bdf8" : "";
}

// PAGE NAV
function showPage(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page-" + page).classList.add("active");
}

// DEFAULT LOAD FIX
window.onload = function() {
  setMode("pro"); // default
};

</script>

</body>
</html>
